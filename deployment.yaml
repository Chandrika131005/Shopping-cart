apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cart
  template:
    metadata:
      labels:
        app: cart
    spec:
      containers:
      - name: cart-container
        image: your-dockerhub/cart-app:latest
        ports:
        - containerPort: 8080